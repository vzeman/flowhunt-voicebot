name: Deployed E2E

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Voicebot API base URL
        required: true
        type: string
      workspace_id:
        description: Workspace ID for scoped checks
        required: false
        default: workspace-1
        type: string
      voicebot_id:
        description: Voicebot ID for scoped checks
        required: false
        default: voicebot-1
        type: string

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run deployed E2E tests
        env:
          VOICEBOT_E2E_BASE_URL: ${{ inputs.base_url }}
          VOICEBOT_E2E_WORKSPACE_ID: ${{ inputs.workspace_id }}
          VOICEBOT_E2E_VOICEBOT_ID: ${{ inputs.voicebot_id }}
        run: python -m pytest -q -m e2e tests/e2e
