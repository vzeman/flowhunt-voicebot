name: Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y ffmpeg ripgrep

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Compile Python files
        run: python -m py_compile voicebot/*.py agents/*.py tests/*.py

      - name: Check whitespace
        run: git diff --check

      - name: Check forbidden code names
        run: '! rg -n "PIPECAT|Pipecat|pipecat" voicebot agents tests'

      - name: Check committed secrets
        run: '! rg -n "sk-proj-|jsFSGFaS3YNbVM4sq87uFACs8e3QFX" --glob "!.env" --glob "!*.pyc" .'
