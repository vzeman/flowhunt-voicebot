name: Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y ffmpeg ripgrep

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Compile Python files
        run: python -m py_compile voicebot/*.py agents/*.py tests/*.py

      - name: Check whitespace
        run: git diff --check

      - name: Check forbidden code names
        run: '! rg -n "PIPECAT|Pipecat|pipecat" voicebot agents tests'

      - name: Check committed secrets
        run: |
          SECRET_PATTERN="sk[-]proj[-][A-Za-z0-9_-]+|sk-[A-Za-z0-9_-]{20,}|gh[pousr]_[A-Za-z0-9_]{20,}|xox[baprs]-[A-Za-z0-9-]{20,}|(?i:(api[_-]?key|secret|token|password)\s*[:=]\s*['\"][A-Za-z0-9_./+=-]{20,}['\"])"
          if rg -n "$SECRET_PATTERN" \
            --glob "!.env" \
            --glob "!*.pyc" \
            --glob "!__pycache__/**" \
            --glob "!.git/**" \
            . \
            | rg -v "your-[A-Za-z0-9_-]+-here|REPLACE_WITH_[A-Z0-9_]+"; then
            exit 1
          fi
