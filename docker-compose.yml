services:
  voicebot:
    build: .
    container_name: flowhunt-voicebot
    restart: unless-stopped
    ports:
      - "${VOICEBOT_API_HOST_PORT:-8080}:8080"
    environment:
      VOICEBOT_API_HOST: 0.0.0.0
      VOICEBOT_API_PORT: 8080
      VOICEBOT_AUDIOSOCKET_HOST: 0.0.0.0
      VOICEBOT_AUDIOSOCKET_PORT: 9019
      VOICEBOT_WEBRTC_STUN_URLS: ${VOICEBOT_WEBRTC_STUN_URLS:-stun:stun.l.google.com:19302}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      VOICEBOT_OPENAI_BASE_URL: ${VOICEBOT_OPENAI_BASE_URL:-}
      VOICEBOT_STT_PROVIDER: ${VOICEBOT_STT_PROVIDER:-whisper}
      VOICEBOT_STT_API_KEY: ${VOICEBOT_STT_API_KEY:-}
      VOICEBOT_STT_BASE_URL: ${VOICEBOT_STT_BASE_URL:-}
      VOICEBOT_STT_MODEL: ${VOICEBOT_STT_MODEL:-}
      VOICEBOT_WHISPER_MODEL: ${VOICEBOT_WHISPER_MODEL:-base}
      VOICEBOT_OPENAI_STT_MODEL: ${VOICEBOT_OPENAI_STT_MODEL:-whisper-1}
      VOICEBOT_LANGUAGE: ${VOICEBOT_LANGUAGE:-en}
      VOICEBOT_STT_PROMPT: ${VOICEBOT_STT_PROMPT:-}
      VOICEBOT_STT_NO_SPEECH_THRESHOLD: ${VOICEBOT_STT_NO_SPEECH_THRESHOLD:-0.60}
      VOICEBOT_STT_LOGPROB_THRESHOLD: ${VOICEBOT_STT_LOGPROB_THRESHOLD:--1.0}
      VOICEBOT_STT_MIN_CHARS: ${VOICEBOT_STT_MIN_CHARS:-2}
      VOICEBOT_DEBUG_AUDIO_CAPTURE: ${VOICEBOT_DEBUG_AUDIO_CAPTURE:-false}
      VOICEBOT_DEBUG_AUDIO_DIR: ${VOICEBOT_DEBUG_AUDIO_DIR:-/data/debug-audio}
      VOICEBOT_TTS_PROVIDER: ${VOICEBOT_TTS_PROVIDER:-supertonic}
      VOICEBOT_TTS_API_KEY: ${VOICEBOT_TTS_API_KEY:-}
      VOICEBOT_TTS_BASE_URL: ${VOICEBOT_TTS_BASE_URL:-}
      VOICEBOT_TTS_MODEL: ${VOICEBOT_TTS_MODEL:-}
      VOICEBOT_TTS_VOICE: ${VOICEBOT_TTS_VOICE:-M1}
      VOICEBOT_OPENAI_TTS_MODEL: ${VOICEBOT_OPENAI_TTS_MODEL:-gpt-4o-mini-tts}
      VOICEBOT_OPENAI_TTS_VOICE: ${VOICEBOT_OPENAI_TTS_VOICE:-alloy}
      VOICEBOT_TTS_CACHE_ENABLED: ${VOICEBOT_TTS_CACHE_ENABLED:-true}
      VOICEBOT_TTS_CACHE_DIR: ${VOICEBOT_TTS_CACHE_DIR:-/data/tts-cache}
      VOICEBOT_START_THRESHOLD: ${VOICEBOT_START_THRESHOLD:-0.020}
      VOICEBOT_STOP_THRESHOLD: ${VOICEBOT_STOP_THRESHOLD:-0.010}
      VOICEBOT_VAD_START_MS: ${VOICEBOT_VAD_START_MS:-120}
      VOICEBOT_BARGE_IN_THRESHOLD: ${VOICEBOT_BARGE_IN_THRESHOLD:-0.30}
      VOICEBOT_ECHO_TAIL_MS: ${VOICEBOT_ECHO_TAIL_MS:-800}
      VOICEBOT_SILENCE_MS: ${VOICEBOT_SILENCE_MS:-700}
      VOICEBOT_MIN_SECONDS: ${VOICEBOT_MIN_SECONDS:-0.8}
      VOICEBOT_MAX_REPLY_CHARS: ${VOICEBOT_MAX_REPLY_CHARS:-240}
      VOICEBOT_DEFERRED_RESPONSE_WAIT_SECONDS: ${VOICEBOT_DEFERRED_RESPONSE_WAIT_SECONDS:-30}
      VOICEBOT_AMI_HOST: asterisk
      VOICEBOT_AMI_PORT: 5038
      VOICEBOT_AMI_USERNAME: voicebot
      VOICEBOT_AMI_PASSWORD: ${AMI_PASSWORD:-voicebot-local-dev}
      FLOWHUNT_API_KEY: ${FLOWHUNT_API_KEY:-}
      FLOWHUNT_WORKSPACE_ID: ${FLOWHUNT_WORKSPACE_ID:-}
      FLOWHUNT_PROJECT_ID: ${FLOWHUNT_PROJECT_ID:-}
      VOICEBOT_FLOWHUNT_BASE_URL: ${VOICEBOT_FLOWHUNT_BASE_URL:-https://api.flowhunt.io}
      VOICEBOT_FLOWHUNT_TIMEOUT: ${VOICEBOT_FLOWHUNT_TIMEOUT:-30}
      VOICEBOT_FLOWHUNT_COMPLEX_BACKEND: ${VOICEBOT_FLOWHUNT_COMPLEX_BACKEND:-project}
      FLOWHUNT_FLOW_ID: ${FLOWHUNT_FLOW_ID:-}
      VOICEBOT_FLOWHUNT_ISSUE_WAIT_SECONDS: ${VOICEBOT_FLOWHUNT_ISSUE_WAIT_SECONDS:-45}
      VOICEBOT_FLOWHUNT_ISSUE_POLL_INTERVAL_SECONDS: ${VOICEBOT_FLOWHUNT_ISSUE_POLL_INTERVAL_SECONDS:-2}
      VOICEBOT_FLOWHUNT_PROGRESS_UPDATE_SECONDS: ${VOICEBOT_FLOWHUNT_PROGRESS_UPDATE_SECONDS:-12}
      VOICEBOT_FLOWHUNT_ISSUE_BACKGROUND_WAIT_SECONDS: ${VOICEBOT_FLOWHUNT_ISSUE_BACKGROUND_WAIT_SECONDS:-600}
      VOICEBOT_FLOWHUNT_FLOW_WAIT_SECONDS: ${VOICEBOT_FLOWHUNT_FLOW_WAIT_SECONDS:-0}
      VOICEBOT_FLOWHUNT_FLOW_POLL_INTERVAL_SECONDS: ${VOICEBOT_FLOWHUNT_FLOW_POLL_INTERVAL_SECONDS:-3}
      VOICEBOT_EVENT_STORE_PROVIDER: ${VOICEBOT_EVENT_STORE_PROVIDER:-json}
      VOICEBOT_EVENT_STORE_PATH: ${VOICEBOT_EVENT_STORE_PATH:-/data/events/events.jsonl}
      VOICEBOT_TRANSCRIPT_DIR: /data/transcripts
      VOICEBOT_SUBAGENT_TASK_STORE_PATH: ${VOICEBOT_SUBAGENT_TASK_STORE_PATH:-/data/subagent_tasks.json}
      VOICEBOT_SUBAGENT_TASK_POLL_LOOP_SECONDS: ${VOICEBOT_SUBAGENT_TASK_POLL_LOOP_SECONDS:-1}
      VOICEBOT_SUBAGENT_TASK_INITIAL_POLL_SECONDS: ${VOICEBOT_SUBAGENT_TASK_INITIAL_POLL_SECONDS:-3}
      VOICEBOT_SUBAGENT_TASK_MAX_POLL_SECONDS: ${VOICEBOT_SUBAGENT_TASK_MAX_POLL_SECONDS:-30}
      VOICEBOT_SUBAGENT_TASK_TIMEOUT_SECONDS: ${VOICEBOT_SUBAGENT_TASK_TIMEOUT_SECONDS:-600}
      VOICEBOT_SUBAGENT_TASK_MAX_ATTEMPTS: ${VOICEBOT_SUBAGENT_TASK_MAX_ATTEMPTS:-100}
      VOICEBOT_AGENT_TASK_RESPONDED_EVENT_RETENTION: ${VOICEBOT_AGENT_TASK_RESPONDED_EVENT_RETENTION:-10000}
      VOICEBOT_SIP_TRUNK_REGISTRY_PATH: /data/sip_trunks.json
      VOICEBOT_SIP_TRUNK_PJSIP_INCLUDE_PATH: /data/asterisk/pjsip-trunks.conf
      VOICEBOT_GREET_ON_CONNECT: ${VOICEBOT_GREET_ON_CONNECT:-true}
      VOICEBOT_CONNECT_GREETING_PROMPT: "${VOICEBOT_CONNECT_GREETING_PROMPT:-The call has connected. Greet the caller and ask how you can help.}"
    volumes:
      - voicebot-cache:/root/.cache
      - voicebot-data:/data

  asterisk:
    image: andrius/asterisk:latest
    container_name: supertronic-asterisk
    restart: unless-stopped
    ports:
      - "5060:5060/udp"
      - "10000-10100:10000-10100/udp"
    environment:
      SIP_HOST: ${SIP_HOST:-}
      SIP_USER: ${SIP_USER:-}
      SIP_PASSWORD: ${SIP_PASSWORD:-}
      AUDIOSOCKET_SERVICE: voicebot:9019
      AMI_USERNAME: voicebot
      AMI_PASSWORD: ${AMI_PASSWORD:-voicebot-local-dev}
      PJSIP_DYNAMIC_INCLUDE: /data/asterisk/pjsip-trunks.conf
      PJSIP_BIND: ${PJSIP_BIND:-0.0.0.0:5060}
    volumes:
      - voicebot-data:/data
      - ./asterisk/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ./asterisk/extensions-docker.conf:/templates/extensions.conf:ro
      - ./asterisk/rtp.conf:/etc/asterisk/rtp.conf:ro
    command: ["/bin/sh", "/docker-entrypoint.sh"]
    depends_on:
      - voicebot

  openai-agent:
    build: .
    container_name: flowhunt-openai-agent
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      VOICEBOT_AGENT_API_KEY: ${VOICEBOT_AGENT_API_KEY:-}
      VOICEBOT_AGENT_OPENAI_BASE_URL: ${VOICEBOT_AGENT_OPENAI_BASE_URL:-}
      VOICEBOT_AGENT_BASE_URL: http://voicebot:8080
      VOICEBOT_AGENT_PROVIDER: ${VOICEBOT_AGENT_PROVIDER:-openai-responses}
      VOICEBOT_COMMUNICATION_AGENT_MODEL: ${VOICEBOT_COMMUNICATION_AGENT_MODEL:-}
      VOICEBOT_COMMUNICATION_AGENT_INTERVAL: ${VOICEBOT_COMMUNICATION_AGENT_INTERVAL:-}
      VOICEBOT_COMMUNICATION_AGENT_TIMEOUT: ${VOICEBOT_COMMUNICATION_AGENT_TIMEOUT:-}
      VOICEBOT_COMMUNICATION_AGENT_MAX_OUTPUT_TOKENS: ${VOICEBOT_COMMUNICATION_AGENT_MAX_OUTPUT_TOKENS:-220}
      VOICEBOT_OPENAI_AGENT_MODEL: ${VOICEBOT_OPENAI_AGENT_MODEL:-gpt-4.1-mini}
      VOICEBOT_OPENAI_AGENT_INTERVAL: ${VOICEBOT_OPENAI_AGENT_INTERVAL:-0.5}
      VOICEBOT_OPENAI_AGENT_TIMEOUT: ${VOICEBOT_OPENAI_AGENT_TIMEOUT:-30}
      VOICEBOT_AGENT_HTTP_TIMEOUT: ${VOICEBOT_AGENT_HTTP_TIMEOUT:-90}
    command: ["python", "agents/openai_agent.py"]
    depends_on:
      - voicebot

  anthropic-agent:
    build: .
    container_name: flowhunt-anthropic-agent
    restart: unless-stopped
    profiles:
      - anthropic
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      VOICEBOT_AGENT_API_KEY: ${VOICEBOT_AGENT_API_KEY:-}
      VOICEBOT_AGENT_BASE_URL: http://voicebot:8080
      VOICEBOT_AGENT_PROVIDER: anthropic
      VOICEBOT_COMMUNICATION_AGENT_MODEL: ${VOICEBOT_COMMUNICATION_AGENT_MODEL:-}
      VOICEBOT_COMMUNICATION_AGENT_INTERVAL: ${VOICEBOT_COMMUNICATION_AGENT_INTERVAL:-}
      VOICEBOT_COMMUNICATION_AGENT_TIMEOUT: ${VOICEBOT_COMMUNICATION_AGENT_TIMEOUT:-}
      VOICEBOT_COMMUNICATION_AGENT_MAX_OUTPUT_TOKENS: ${VOICEBOT_COMMUNICATION_AGENT_MAX_OUTPUT_TOKENS:-220}
      VOICEBOT_ANTHROPIC_AGENT_MODEL: ${VOICEBOT_ANTHROPIC_AGENT_MODEL:-claude-sonnet-4-20250514}
      VOICEBOT_ANTHROPIC_AGENT_INTERVAL: ${VOICEBOT_ANTHROPIC_AGENT_INTERVAL:-0.5}
      VOICEBOT_ANTHROPIC_AGENT_TIMEOUT: ${VOICEBOT_ANTHROPIC_AGENT_TIMEOUT:-30}
      VOICEBOT_AGENT_HTTP_TIMEOUT: ${VOICEBOT_AGENT_HTTP_TIMEOUT:-90}
    command: ["python", "agents/anthropic_agent.py"]
    depends_on:
      - voicebot

volumes:
  voicebot-cache:
  voicebot-data:
